<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Second Brain AI</title>
    <style>
      body { font-family: Arial, sans-serif; width: 320px; margin: 0; padding: 16px; background: linear-gradient(160deg, #fff7ed, #eff6ff); }
      input, button, textarea { width: 100%; box-sizing: border-box; border-radius: 14px; border: 1px solid #cbd5e1; padding: 10px 12px; margin-top: 8px; }
      button { background: #c2410c; color: white; border: none; font-weight: 700; cursor: pointer; }
      small { color: #475569; display: block; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h2>Second Brain AI</h2>
    <label>JWT Token</label>
    <textarea id="token" rows="3" placeholder="Paste token from web app"></textarea>
    <label>API Base URL</label>
    <input id="baseUrl" value="http://localhost:4000" />
    <button id="saveCurrentTab">Save Current Tab</button>
    <small id="status"></small>
    <script src="popup.js"></script>
  </body>
</html>
